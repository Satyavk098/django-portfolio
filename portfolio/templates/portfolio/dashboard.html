{% extends 'portfolio/base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<section>
  <h2>Admin Dashboard</h2>

  <p>
    <a href="{% url 'project_add' %}" class="btn">Add New Project</a>
  </p>

  {% if projects %}
    <div class="project-grid">
      {% for project in projects %}
        <div class="card">
          <h3>{{ project.title }}</h3>

          <p>
            <a href="{% url 'project_edit' project.id %}" class="btn secondary">
              Edit
            </a>

            <a href="{% url 'project_delete' project.id %}" class="btn secondary">
              Delete
            </a>
          </p>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p>No projects added yet.</p>
  {% endif %}
</section>
{% endblock %}
