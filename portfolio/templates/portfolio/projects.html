{% extends "portfolio/base.html" %}

{% block title %}Projects{% endblock %}

{% block content %}
<h1>Projects</h1>

<div class="project-grid">
  {% for project in projects %}
    <div class="card">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description|truncatechars:120 }}</p>
      <a href="{% url 'project_detail' project.slug %}">
        View details →
      </a>
    </div>
  {% endfor %}
</div>
{% endblock %}
